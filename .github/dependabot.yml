version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # One PR for minor+patch across the workspace; majors held separately.
      minor-and-patch:
        update-types: ["minor", "patch"]
      major-updates:
        update-types: ["major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
