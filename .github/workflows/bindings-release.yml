name: bindings-release

# Publishes the `@agentidentitytrustprotocol/aitp` Node.js SDK (NAPI
# prebuilts) to npm, and attaches the native `.node` binaries to a GitHub
# Release.
#
# Trigger: push a tag of the form `aitp-node-v0.2.0`. The job matrix
# cross-builds the native `.node` for every target in
# `bindings/aitp-node/package.json`'s `napi.triples`, then a single
# publish job assembles the per-platform npm packages
# (`@agentidentitytrustprotocol/aitp-darwin-arm64`, …) plus the loader
# package (`@agentidentitytrustprotocol/aitp`) via `napi prepublish` and
# `npm publish`.
#
# Built with the STABLE default feature set (the v0.1 surface). To ship
# the experimental surface instead, add `--features experimental` to the
# two `napi build` steps below.
#
# Requires repo secret `NPM_TOKEN`: an npm automation token with publish
# rights to the `@agentidentitytrustprotocol` scope. The tag version must
# match `version` in package.json and Cargo.toml.

on:
  push:
    tags:
      - 'aitp-node-v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only; skip npm publish + GitHub release'
        type: boolean
        default: true

permissions:
  contents: read

defaults:
  run:
    working-directory: bindings/aitp-node

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        # napi cross-compiling tripped over the repo's 1.89.0 toolchain
        # pin (the cross target's std landed on `stable`, not 1.89.0)
        # and the zig path. The toolchain step below now pins 1.89.0 and
        # adds the target's std there, so the macOS x86_64 cross (arm ->
        # x86, same OS) builds reliably without a scarce Intel runner.
        # Linux arm64 builds on a native `ubuntu-24.04-arm` runner (free
        # for public repos) — cross-assembling `ring` for aarch64 from
        # x86 is the part that doesn't work.
        include:
          - target: x86_64-apple-darwin
            host: macos-latest      # cross arm -> x86 (std pinned below)
          - target: aarch64-apple-darwin
            host: macos-latest      # native Apple silicon
          - target: x86_64-unknown-linux-gnu
            host: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            host: ubuntu-24.04-arm  # native arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89.0"        # match rust-toolchain.toml
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/aitp-node
      - name: Install dependencies
        run: npm install
      - name: Build (native)
        run: npx napi build --platform --release --target ${{ matrix.target }}
      - name: Upload .node artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: bindings/aitp-node/*.node
          if-no-files-found: error

  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write   # create the GitHub release
      id-token: write   # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm install
      - name: Download all .node artifacts
        uses: actions/download-artifact@v4
        with:
          path: bindings/aitp-node/artifacts
          pattern: bindings-*
          merge-multiple: true
      - name: Scaffold per-platform npm package dirs
        run: npx napi create-npm-dir -t .
      - name: Assemble per-platform npm dirs
        run: npx napi artifacts --dir artifacts
      - name: List what will be published
        run: ls -R npm && ls -la *.node 2>/dev/null || true
      # `napi prepublish` only publishes the per-platform binary packages
      # (@agentidentitytrustprotocol/aitp-darwin-arm64, …). It does NOT
      # publish the root loader package — that needs `npm publish`. Do
      # both, as two steps.
      - name: Publish platform packages
        if: ${{ github.event_name == 'push' || !inputs.dry_run }}
        run: npx napi prepublish -t npm --skip-gh-release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
      # `if: always()` so re-running a partially-completed release (where
      # the platform packages already exist and the step above errors with
      # "cannot publish over existing version") still publishes the root.
      # `--ignore-scripts` stops npm from re-running `prepublishOnly`
      # (which is `napi prepublish`) and republishing the platform packages.
      - name: Publish root loader package
        if: ${{ always() && (github.event_name == 'push' || !inputs.dry_run) }}
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
      - name: Attach native binaries to GitHub Release
        if: ${{ github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          files: bindings/aitp-node/artifacts/*.node
          fail_on_unmatched_files: true
