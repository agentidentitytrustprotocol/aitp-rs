name: bump-spec
# Adopt a new AITP spec revision. Dispatched by the spec repo's
# notify-spec-consumers on a conformance-relevant push; also runnable manually.
# The spec SHA is pinned in tests/schemas/SPEC_VERSION (a plain file read by
# ci.yml as `ref:`), so bump-spec-ref runs in file mode (Contents:write only).
# The PR it opens is HELD — never auto-merged: adopting a new spec is a
# deliberate review decision, and the PR's own conformance CI runs against the
# new fixtures.
on:
  repository_dispatch:
    types: [spec-released]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Spec SHA (blank = event payload / spec HEAD)'
        required: false
        default: ''
jobs:
  bump:
    uses: agentidentitytrustprotocol/aitp-ci/.github/workflows/bump-spec-ref.yml@v1
    with:
      mode: file
      file: tests/schemas/SPEC_VERSION
      sha: ${{ github.event.inputs.sha }}
    secrets: inherit
