name: _diag
# TEMPORARY: makes `cargo publish` actually reach crates.io token validation
# by targeting a crate we don't own with a nonexistent version. A valid token
# yields an ownership error; a mangled token yields the format error.
# Nothing is ever published. Delete after reading output.
on:
  push:
    branches: [main]
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo publish reaching crates.io auth
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          mkdir -p /tmp/tc/src
          cat > /tmp/tc/Cargo.toml <<'EOF'
          [package]
          name = "serde"
          version = "999999.0.0"
          edition = "2021"
          description = "diag"
          license = "MIT"
          EOF
          echo "// diag" > /tmp/tc/src/lib.rs
          cd /tmp/tc
          echo "=== cargo publish (reaches crates.io auth via CARGO_REGISTRY_TOKEN) ==="
          cargo publish --no-verify --allow-dirty 2>&1 | tail -8 || true
