name: _diag
# TEMPORARY: isolates whether plain `cargo publish` mangles the token.
# Publishes an already-taken version so crates.io auths then says
# "already uploaded" (harmless). Delete after reading output.
on:
  push:
    branches: [main]
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo publish with CI token (already-taken version)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -x
          mkdir -p /tmp/tc/src
          cat > /tmp/tc/Cargo.toml <<'EOF'
          [package]
          name = "aitp-core"
          version = "0.4.0"
          edition = "2021"
          description = "diag"
          license = "MIT"
          EOF
          echo "// diag" > /tmp/tc/src/lib.rs
          cd /tmp/tc
          echo "=== A) via CARGO_REGISTRY_TOKEN env ==="
          cargo publish --no-verify --allow-dirty 2>&1 | tail -6 || true
          echo "=== B) via explicit --token flag ==="
          cargo publish --no-verify --allow-dirty --token "$CARGO_REGISTRY_TOKEN" 2>&1 | tail -6 || true
