name: release-plz

# Publishes the Rust protocol crates (aitp-core, aitp-crypto, …, aitp) to
# crates.io and cuts a GitHub Release per crate.
#
# release-plz runs on every push to main and opens/updates a "release PR"
# that bumps versions + changelogs. Merging that PR triggers the actual
# `cargo publish` (in dependency order) + git tags + GitHub releases.
#
# Crates that must NOT hit crates.io (conformance runner, adapter, draft
# session-bundle, examples, mint-* tools) are excluded via release-plz.toml.
#
# Requires repo secrets:
#   - CARGO_REGISTRY_TOKEN — a crates.io API token with publish rights.
#   - (GITHUB_TOKEN is provided automatically.)

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'agentidentitytrustprotocol' }}
    steps:
      - name: Mint GitHub App token
        id: app
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.AITP_BOT_APP_ID }}
          private-key: ${{ secrets.AITP_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app.outputs.token }}
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master (stable)
        with:
          toolchain: stable
      - uses: MarcoIeni/release-plz-action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5
        # Default command = release-pr + release. On each push to main it
        # opens/updates a "Release PR" (version bumps + changelogs from
        # conventional commits, lockstep across the crate family); merging that
        # PR is what actually publishes to crates.io, tags, and cuts GitHub
        # releases. The aitp-deps-bot App token (NOT GITHUB_TOKEN) opens the
        # Release PR — so its required CI actually runs (GITHUB_TOKEN PRs don't
        # trigger workflows) and it doesn't need the org "Allow GitHub Actions
        # to create and approve pull requests" policy.
        with:
          token: ${{ steps.app.outputs.token }}
        env:
          GITHUB_TOKEN: ${{ steps.app.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
