name: Notify Website of Doc Changes

# When docs or the README land on main, ping the website repo so it
# re-runs scripts/sync-content.sh and opens a docs-sync PR. The website's
# sync-docs.yml workflow listens for the `docs-updated` repository_dispatch.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
  # Allow firing the website sync by hand from the Actions tab.
  workflow_dispatch:

# The dispatch authenticates via a short-lived aitp-deps-bot App token
# (org secrets AITP_BOT_APP_ID / AITP_BOT_PRIVATE_KEY) — no PAT.
permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App token (scoped to aitp-website)
        id: app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.AITP_BOT_APP_ID }}
          private-key: ${{ secrets.AITP_BOT_PRIVATE_KEY }}
          owner: agentidentitytrustprotocol
          repositories: aitp-website

      - name: Trigger website sync
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
        with:
          token: ${{ steps.app.outputs.token }}
          repository: agentidentitytrustprotocol/aitp-website
          event-type: docs-updated
