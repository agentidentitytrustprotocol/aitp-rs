name: bindings

# CI for the language bindings (excluded from the Rust workspace, so the
# main `ci.yml` only fmt+clippy-checks them — it never builds the wheel /
# native addon). This workflow actually BUILDS each SDK and runs its test
# suite, plus the cross-language interop suite, so binding breakage is
# caught on PRs instead of at release time.
#
# Built with `--features experimental` because the per-language test
# suites cover the experimental surface (pinning, renewal, session
# bundle, p256, multihop). The RELEASE workflows ship the stable
# default surface — see bindings-release.yml / aitp-py-release.yml.

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'bindings/**'
      - 'scripts/interop.sh'
      - '.github/workflows/bindings.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'bindings/**'
      - 'scripts/interop.sh'
      - '.github/workflows/bindings.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  aitp-py:
    name: aitp-py (python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.9', '3.11', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Standalone [workspace] in the binding's Cargo.toml, so a
          # separate cache key keeps its target/ from competing with the
          # root crate's.
          workspaces: bindings/aitp-py
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      # `maturin develop` requires an active venv — it refuses to install
      # into the bare hosted-tool Python. Create one and promote it into
      # PATH + VIRTUAL_ENV for every subsequent step.
      - name: Create and activate venv
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
      - name: Install maturin + test deps
        # pyjwt[crypto] + cryptography back the OIDC identity test (mock
        # IdP signs Ed25519 JWTs in-process); httpx backs the transport
        # tests. Mirrors the `dev` extra in pyproject.toml.
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'maturin>=1.5,<2.0' pytest httpx 'pyjwt[crypto]>=2.8' 'cryptography>=41'
      - name: Build the wheel (editable, experimental surface)
        working-directory: bindings/aitp-py
        run: maturin develop --release --features experimental
      - name: pytest
        working-directory: bindings/aitp-py
        run: pytest tests/ -v

  aitp-node:
    name: aitp-node (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/aitp-node
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        working-directory: bindings/aitp-node
        run: npm install
      - name: Build the native binary (experimental surface)
        working-directory: bindings/aitp-node
        run: npm run build:experimental:debug
      - name: node --test
        working-directory: bindings/aitp-node
        # Explicit glob: Node 22+ treats `--test tests/` as a module path
        # (MODULE_NOT_FOUND) instead of recursing into the dir.
        run: node --test tests/*.mjs

  interop:
    name: interop (python ↔ node)
    runs-on: ubuntu-latest
    needs: [aitp-py, aitp-node]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            bindings/aitp-py
            bindings/aitp-node
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # scripts/interop.sh creates its own venv, installs maturin/pytest/
      # pyjwt/cryptography, builds both SDKs with the experimental feature,
      # then drives a real four-message handshake between them.
      - name: Cross-language interop
        run: make interop
