name: aitp-py-release

# Publishes the `aitp` Python SDK (abi3 wheels) to PyPI and attaches the
# wheels + sdist to a GitHub Release.
#
# Trigger: push a tag of the form `aitp-py-v0.2.0`. The build matrix
# cross-builds one cp39-abi3 wheel per OS/arch (matching the Node SDK's
# platform set) plus a source distribution; the publish job uploads them
# all to PyPI in one shot.
#
# Built with default features, which ship the full capability surface
# (renewal, session bundles, SPKI pinning, multi-hop delegation). For a
# minimal wheel, add `--no-default-features` to the maturin `args` below.
#
# Publishing uses PyPI Trusted Publishing (OIDC) — NO API token or secret.
# One-time setup on PyPI (https://pypi.org/manage/account/publishing/):
#   - PyPI project name: aitp-sdk   (the bare `aitp` name is taken; the
#                                    import name stays `aitp` via maturin
#                                    module-name in pyproject.toml)
#   - Owner:       agentidentitytrustprotocol
#   - Repository:  aitp-rs
#   - Workflow:    aitp-py-release.yml
#   - Environment: pypi
# To use an API token instead, drop the `id-token`/`environment` lines on
# the publish job and set `password: ${{ secrets.PYPI_API_TOKEN }}` on the
# pypa/gh-action-pypi-publish step.
#
# NOTE: the tag version must match `version` in both bindings/aitp-py/
# pyproject.toml and bindings/aitp-py/Cargo.toml.

on:
  push:
    tags:
      - 'aitp-py-v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only; skip PyPI publish + GitHub release'
        type: boolean
        default: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  wheels:
    name: wheel ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: x86_64-apple-darwin
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto
          # Native arm64 runner: build the aarch64 wheel natively so
          # `ring`'s ARM asm assembles (cross-compiling it in the x86
          # manylinux container fails with "ARM assembler must define
          # __ARM_ARCH"). Free GitHub-hosted runner for public repos.
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: auto
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # maturin-action picks up `abi3-py39` from Cargo.toml and emits a
      # single cp39-abi3 wheel per target; `manylinux: auto` builds the
      # Linux wheels in a manylinux container (and cross-compiles aarch64).
      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          working-directory: bindings/aitp-py
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-${{ matrix.target }}
          path: bindings/aitp-py/dist/*.whl
          if-no-files-found: error

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          working-directory: bindings/aitp-py
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: bindings/aitp-py/dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: [wheels, sdist]
    # Skip on a dry-run workflow_dispatch; always publish on a tag push.
    if: ${{ github.event_name == 'push' || !inputs.dry_run }}
    environment: pypi
    permissions:
      contents: write   # create the GitHub release
      id-token: write   # PyPI trusted publishing (OIDC)
    steps:
      - name: Download all wheels + sdist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: List what will be published
        run: ls -la dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist
      - name: Attach wheels + sdist to GitHub Release
        if: ${{ github.event_name == 'push' }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          fail_on_unmatched_files: true

  # After a real PyPI publish, tell the Python consumer (aitp-playground) to
  # adopt the new SDK version. Its bump-aitp.yml calls aitp-ci/bump-consume,
  # which waits for PyPI to serve the version, runs `uv lock --upgrade-package
  # aitp-sdk`, and opens an auto-merging PR. Dependabot's weekly aitp-sdk group
  # is the backstop. Auth: the aitp-deps-bot App token — no PAT.
  dispatch:
    name: notify aitp-playground (uv)
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#aitp-py-v}" >> "$GITHUB_OUTPUT"
      - name: Mint GitHub App token (scoped to aitp-playground)
        id: app
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.AITP_BOT_APP_ID }}
          private-key: ${{ secrets.AITP_BOT_PRIVATE_KEY }}
          owner: agentidentitytrustprotocol
          repositories: aitp-playground
      - name: Dispatch aitp-released (uv)
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ steps.app.outputs.token }}
          repository: agentidentitytrustprotocol/aitp-playground
          event-type: aitp-released
          client-payload: '{"version": "${{ steps.ver.outputs.version }}", "ecosystem": "uv"}'
