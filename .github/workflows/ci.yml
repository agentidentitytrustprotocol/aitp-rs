name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }} / ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable]
        include:
          - os: ubuntu-latest
            toolchain: "1.88.0"   # MSRV gate (driven by transitive deps)
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets --all-features
      - run: cargo test --workspace --all-features --no-fail-fast

  docs:
    name: docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  spec-schemas:
    name: vendored schemas in sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aitp-rs
        uses: actions/checkout@v6
        with:
          path: aitp-rs
      - name: Checkout spec at pinned commit
        uses: actions/checkout@v6
        with:
          repository: agentidentitytrustprotocol/agentidentitytrustprotocol
          path: spec
      - name: Verify vendored schemas match pinned spec commit
        working-directory: aitp-rs
        run: |
          PIN="$(cat tests/schemas/SPEC_VERSION)"
          (cd ../spec && git checkout "$PIN")
          AITP_SPEC="$PWD/../spec" scripts/sync-schemas.sh
          if ! git diff --quiet -- tests/schemas/; then
            echo "::error::Vendored schemas drift from pinned spec commit $PIN."
            echo "Run scripts/sync-schemas.sh locally and commit the result."
            git diff -- tests/schemas/
            exit 1
          fi
