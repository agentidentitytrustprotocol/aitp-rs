name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short
  # Workspace-only crates that aren't published. Excluded from
  # semver-checks (they don't ship to crates.io) and from
  # tarpaulin's coverage denominator (the mint-* binaries inflate
  # the line count without contributing tests). Single source of
  # truth so the two jobs can't drift.
  #
  # Note: aitp-conformance is in PUBLISH_EXCLUDE because its
  # subprocess-driven entry point isn't part of the published
  # surface, but it IS in the coverage scope because its
  # integration tests exercise other crates' public APIs.
  PUBLISH_EXCLUDE_CRATES: "aitp-conformance,aitp-rs-adapter,aitp-cli,aitp-example-two-agents,mint-signed-examples,mint-conformance-fixtures"
  COVERAGE_EXCLUDE_CRATES: "mint-signed-examples mint-conformance-fixtures aitp-example-two-agents aitp-cli"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Detect whether a PR touches Rust/build inputs. The two heavy net-new
  # jobs below (conformance, wasm) gate on this so a docs-only PR skips
  # them instead of spending several minutes rebuilding the workspace.
  # The pre-existing required jobs (test, coverage, semver) are left
  # ungated on purpose — skip semantics interact badly with branch
  # protection's required-check list.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'tests/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.github/workflows/ci.yml'

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master (stable)
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master (stable)
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  bindings-lint:
    name: bindings fmt + clippy
    runs-on: ubuntu-latest
    # The language bindings (bindings/aitp-py, bindings/aitp-node) are
    # excluded from the workspace, so the `fmt` and `clippy` jobs above do
    # NOT cover them. Lint them here — fmt + clippy only, no maturin/napi
    # wheel build, so no Python/Node toolchain is needed. The pyo3/napi
    # crates type-check (and pyo3's build script finds the runner's
    # preinstalled python3) without an extension build.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master (stable)
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            bindings/aitp-py
            bindings/aitp-node
      - name: rustfmt — aitp-py
        run: cargo fmt --manifest-path bindings/aitp-py/Cargo.toml -- --check
      - name: rustfmt — aitp-node
        run: cargo fmt --manifest-path bindings/aitp-node/Cargo.toml -- --check
      - name: clippy — aitp-py
        run: cargo clippy --manifest-path bindings/aitp-py/Cargo.toml --all-targets --all-features -- -D warnings
      - name: clippy — aitp-node
        run: cargo clippy --manifest-path bindings/aitp-node/Cargo.toml --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }} / ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable]
        include:
          - os: ubuntu-latest
            toolchain: "1.89.0"   # MSRV gate — kept in lockstep with rust-toolchain.toml and rust-version
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@50414676f9f5d50a65992c6dd2ed02641263226c # v2
        with:
          tool: cargo-nextest
      - run: cargo build --workspace --all-targets --all-features
      # nextest is faster and gives clearer per-test output, but it does
      # NOT run doctests — those need a separate `cargo test --doc` pass.
      - run: cargo nextest run --workspace --all-features --no-fail-fast
      - run: cargo test --doc --workspace --all-features

  docs:
    name: docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master (stable)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo doc --workspace --no-deps --all-features

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
          arguments: --all-features

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  semver:
    name: cargo-semver-checks
    runs-on: ubuntu-latest
    # Skip on the release branch / first commit (no prior tag to compare).
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master (stable)
        with:
          toolchain: stable
      - uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239 # v2
        with:
          # Use the PR base commit SHA (not the ref name). With only the
          # PR head checked out, `main` doesn't exist as a local ref —
          # cargo-semver-checks fails to resolve `main^{tree}`. The SHA
          # is unambiguous and present after `fetch-depth: 0`.
          baseline-rev: ${{ github.event.pull_request.base.sha }}
          # Skip the workspace-only crates that aren't published, plus
          # any crate that lacks a released baseline to compare against
          # (semver-checks needs a prior crates.io version; brand-new
          # publishes have none).
          # `aitp-envelope` and `aitp-session-bundle` are published crates
          # with no crates.io baseline yet, so they stay out of
          # PUBLISH_EXCLUDE_CRATES but are appended inline here; drop each
          # one once its first version is released and can be compared to.
          exclude: ${{ env.PUBLISH_EXCLUDE_CRATES }},aitp-envelope,aitp-session-bundle

  msrv:
    name: cargo-msrv (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master (stable)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-msrv
        # Install from outside the repo so rustup ignores the
        # rust-toolchain.toml pin (1.89) and uses the runner's stable
        # toolchain to compile cargo-msrv. The latest cargo-msrv
        # (≥0.19) requires rustc ≥1.91 and won't compile under 1.89.
        working-directory: /tmp
        run: cargo install --locked cargo-msrv
      - name: Verify pinned MSRV (1.89) still builds
        # cargo-msrv verify reads `package.rust-version` from a single
        # package manifest — it doesn't understand virtual workspaces.
        # Point it at the facade crate, which transitively depends on
        # every protocol crate via path deps. If `aitp` compiles under
        # 1.89, the whole workspace does.
        run: cargo msrv verify --manifest-path crates/aitp/Cargo.toml

  coverage:
    name: coverage (tarpaulin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master (stable)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-tarpaulin
        # Install from outside the repo so the project's pinned MSRV
        # (1.89 in rust-toolchain.toml) doesn't gate the install. The
        # latest cargo-tarpaulin pulls in `cargo-platform` 0.3.x, which
        # requires rustc ≥1.91; the runner's stable toolchain handles it.
        working-directory: /tmp
        run: cargo install --locked cargo-tarpaulin
      - name: Build adapter binary
        # crates/aitp-conformance/tests/runner_integration.rs spawns
        # target/<profile>/aitp-rs-adapter as a subprocess. Plain
        # `cargo test --workspace` builds it as part of the workspace
        # graph, but tarpaulin's underlying `cargo test --no-run` only
        # produces test artifacts — bin targets that aren't a direct
        # test dep aren't built. Build it explicitly so the 12 runner
        # integration tests don't panic in adapter_path().
        run: cargo build -p aitp-rs-adapter
      - name: Run coverage with floor
        # Tarpaulin's --fail-under <pct> exits non-zero if total
        # workspace coverage drops below that threshold.
        #
        # Baseline measured on rc.1 (post-RFC sweep, 2026-05-04):
        # 52.6% workspace lines covered with the exclude list below.
        # The 50% floor leaves a ~2.5 pt buffer for normal variation
        # (test scheduling, ptrace skew on different runners) without
        # opening room for real regressions. Ratchet policy: raise the
        # floor in 5-pt steps as new tests land, toward an 80%-per-crate
        # target.
        #
        # Excludes: mint-* binaries and the example agent are
        # entry-point binaries with no in-binary tests; their lines
        # only inflate the denominator. aitp-conformance is included
        # because its integration tests exercise other crates'
        # public surface.
        # Note: each excluded crate needs its own --exclude flag.
        # `--exclude a b c` is parsed as one excluded value plus two
        # stray positionals. We expand the env-var space-separated
        # list into per-flag pairs at the shell layer so the exclude
        # set lives in exactly one place (the workflow-level env).
        run: |
          excludes=()
          for c in ${COVERAGE_EXCLUDE_CRATES}; do
            excludes+=(--exclude "$c")
          done
          cargo tarpaulin \
            --workspace --all-features --skip-clean --timeout 180 \
            "${excludes[@]}" \
            --out Xml --output-dir coverage --fail-under 50
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage/cobertura.xml

  spec-schemas:
    name: vendored schemas in sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aitp-rs
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: aitp-rs
      - name: Read pinned spec commit
        id: pin
        run: echo "sha=$(cat aitp-rs/tests/schemas/SPEC_VERSION)" >> "$GITHUB_OUTPUT"
      - name: Checkout spec at pinned commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: agentidentitytrustprotocol/agentidentitytrustprotocol
          path: spec
          ref: ${{ steps.pin.outputs.sha }}
      - name: Verify vendored schemas match pinned spec commit
        working-directory: aitp-rs
        run: |
          PIN="$(cat tests/schemas/SPEC_VERSION)"
          AITP_SPEC="$PWD/../spec" scripts/sync-schemas.sh
          if ! git diff --quiet -- tests/schemas/; then
            echo "::error::Vendored schemas drift from pinned spec commit $PIN."
            echo "Run scripts/sync-schemas.sh locally and commit the result."
            git diff -- tests/schemas/
            exit 1
          fi

  conformance:
    name: conformance fixtures
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aitp-rs
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: aitp-rs
      - name: Read pinned spec commit
        id: pin
        run: echo "sha=$(cat aitp-rs/tests/schemas/SPEC_VERSION)" >> "$GITHUB_OUTPUT"
      - name: Checkout spec at pinned commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: agentidentitytrustprotocol/agentidentitytrustprotocol
          path: spec
          ref: ${{ steps.pin.outputs.sha }}
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master (stable)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: aitp-rs
      - name: Build adapter + runner
        working-directory: aitp-rs
        run: cargo build -p aitp-rs-adapter -p aitp-conformance
      - name: Run the full fixture corpus against the Rust adapter
        working-directory: aitp-rs
        # Opt into the draft features so the bundle-*/multihop fixtures
        # run instead of being SKIPped. The runner exits non-zero if any
        # required fixture FAILs. Expected: 51 pass / 0 fail / 2 skip
        # (del-004 is a frozen v0.1 shape; see docs/conformance.md).
        run: |
          ./target/debug/aitp-conformance run \
            --target ./target/debug/aitp-rs-adapter \
            --fixtures-dir ../spec/schemas/conformance \
            --feature experimental-multihop-delegation \
            --feature experimental-session-bundle

  wasm:
    name: wasm portability check
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Pin to 1.89.0 (matching rust-toolchain.toml) and install the wasm
      # target for THAT toolchain. Installing it for `stable` would miss:
      # rust-toolchain.toml overrides cargo to 1.89.0 inside the repo, and
      # 1.89.0 auto-installs with a minimal profile (no wasm target),
      # yielding `can't find crate for core` (E0463).
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.89.0"
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # Guards the "pure crates stay portable" invariant: no native-only
      # syscall dependency may creep into the sync verify/protocol crates.
      # Target is wasm32-wasip1 (has a randomness source). Full browser
      # wasm32-unknown-unknown additionally needs a uuid rng feature —
      # tracked as a gated decision in plans/defered/deferred.md.
      - name: cargo check --target wasm32-wasip1 (pure crates)
        run: |
          for c in aitp-core aitp-crypto aitp-envelope aitp-manifest \
                   aitp-tct aitp-delegation aitp-session-bundle; do
            echo "== $c =="
            cargo check -p "$c" --target wasm32-wasip1
          done
