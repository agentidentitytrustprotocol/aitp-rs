name: miri

# Miri checks for undefined behavior on the crates that contain unsafe
# or low-level byte-shuffling — primarily aitp-core (JCS, AID parsing)
# and aitp-crypto. Miri is slow and occasionally needs feature gating
# (ed25519-dalek pulls in code paths Miri doesn't model perfectly), so
# this workflow is intentionally NOT a PR gate. Trigger it manually
# (or on a weekly schedule) when adding crypto code or touching
# canonicalization, and inspect the output.

on:
  schedule:
    - cron: "23 4 * * 1"   # 04:23 UTC every Monday
  workflow_dispatch:
    inputs:
      crates:
        description: "Comma-separated -p arguments (default: aitp-core,aitp-crypto)"
        required: false
        default: "aitp-core,aitp-crypto"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  # Miri's tree-borrows is the recommended aliasing model for new
  # code. `-Zmiri-disable-isolation` was needed when the JCS test
  # path read vendored fixtures from disk; the unit tests covered
  # by `--lib` don't touch the filesystem, so we drop it now to
  # tighten the sandbox.
  MIRIFLAGS: "-Zmiri-tree-borrows -Zmiri-strict-provenance"

permissions:
  contents: read

jobs:
  miri:
    name: miri (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - aitp-core
          - aitp-crypto
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install nightly + miri
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master (nightly)
        with:
          toolchain: nightly
          components: miri, rust-src
      - name: Setup miri
        # `+nightly` is required: rust-toolchain.toml pins the repo to stable
        # 1.89.0, and Miri is a nightly-only component — a bare `cargo miri
        # setup` resolves to 1.89.0 and fails with "the 'miri' component ... is
        # not available". The test step below already pins +nightly.
        run: cargo +nightly miri setup
      - name: Run miri tests
        # Skip integration tests that read large vendored fixtures —
        # the unit tests inside src/ are the high-value target for
        # UB checks (JCS canonicalization, AID byte parsing).
        run: cargo +nightly miri test -p ${{ matrix.crate }} --lib
